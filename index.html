<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRISIS CONNECT | Command Center</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  
  <!-- Shared Styles -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  
  <!-- Page Specific Styles -->
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-left">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="2,12 5,12 6.5,8 8,15 9.5,9 11,14 12,12 14,12 22,12"/>
      </svg>
      <h1><span class="brand-crisis">CRISIS</span><span class="brand-connect">CONNECT</span></h1>
    </div>
    <div class="nav-center">
      <input type="text" class="search-input" placeholder="Search disasters, regions...">
    </div>
    <div class="nav-right">
      <div class="bell-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
        <div class="badge data-font">3</div>
      </div>
      <div class="live-status">
        <div class="live-dot"></div>
        LIVE
      </div>
    </div>
    <div class="nav-right-extra">
      <span class="mono" id="nav-user"></span>
      <button onclick="ccLogout()">⏏ LOGOUT</button>
    </div>
  </nav>

  <div class="app-shell">
    <!-- Sidebar -->
    <aside class="sidebar">
      <a href="index.html" class="sidebar-btn active" title="Dashboard">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
      </a>
      <a href="disaster.html" class="sidebar-btn" title="Disasters">
        <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
      </a>
      <a href="displacement.html" class="sidebar-btn" title="Displacement">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
      </a>
      <a href="resources.html" class="sidebar-btn" title="Resources">
        <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
      </a>
      <a href="secondary-risk.html" class="sidebar-btn" title="Risk">
        <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
      </a>
      <a href="simulate.html" class="sidebar-btn" title="Simulate">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg>
      </a>
      <a href="analytics.html" class="sidebar-btn" title="Analytics">
        <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
      </a>
      <a href="alerts.html" class="sidebar-btn" title="Alerts">
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
      </a>
      <a href="emergency.html" class="sidebar-btn" title="Emergency" style="margin-top:auto; margin-bottom: 10px;">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
      </a>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div id="map"></div>
      
      <!-- Overlays -->
      <div class="stats-panel-wrapper" id="stats-wrapper">
        <div class="stats-card">
          <div class="panel-header">
            <h2>INTELLIGENCE OVERVIEW</h2>
          </div>
          <div class="stat-item">
            <span class="stat-label">ACTIVE DISASTERS</span>
            <span class="stat-value val-cyan data-font" id="stat-active">-</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">PEOPLE AFFECTED</span>
            <span class="stat-value val-amber data-font" id="stat-affected">-</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">CRITICAL ALERTS</span>
            <span class="stat-value val-red data-font" id="stat-critical">-</span>
          </div>
        </div>
        <button class="toggle-arrow" onclick="document.getElementById('stats-wrapper').classList.toggle('collapsed')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
      </div>

      <div class="map-controls">
        <button class="control-btn" id="btn-heatmap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12c0 5.52-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2s10 4.48 10 10z"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="7" stroke-opacity="0.5"/></svg>
          HEATMAP OFF
        </button>
        <button class="control-btn" id="btn-fit">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h6v2H5v4H3V3m18 0h-6v2h4v4h2V3m-2 18h-4v2h6v-6h-2v4M3 21h6v-2H5v-4H3v6"/></svg>
          FIT ALL
        </button>
        <button class="control-btn" id="btn-refresh">
          <span class="spin-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg></span>
          REFRESH
        </button>
      </div>

      <!-- Slide Up Panel -->
      <div class="slide-panel" id="disaster-panel">
        <div class="panel-top">
          <div>
            <h3 class="disaster-title" id="p-title">Disaster Name</h3>
            <span class="badge-pill" id="p-type">TYPE</span>
          </div>
          <button class="close-panel" id="close-panel">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>
        <div class="severity-blocks" id="p-severity"></div>
        <div class="affected-box">
          <div class="affected-label">Registered Population Affected</div>
          <div class="affected-num data-font" id="p-affected">0</div>
        </div>
        <a href="#" class="report-btn" id="p-btn">VIEW FULL REPORT &rarr;</a>
      </div>

    </main>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div>LAST UPDATED: <span id="timestamp" class="data-font"></span></div>
    <div><div class="live-status" style="display:inline-flex;"><div class="live-dot"></div></div>&nbsp;&nbsp;CRISISCONNECT v1.0 | GLOBAL DISASTER INTELLIGENCE</div>
  </div>

  <!-- External Map Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

  <!-- Shared Logic -->
  <script src="js/auth.js"></script>
  
  <!-- Page Specific Logic -->
  <script src="js/dashboard.js"></script>
</body>
</html>
